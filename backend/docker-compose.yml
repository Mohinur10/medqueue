version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: medqueue_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-medqueue}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-password}
      POSTGRES_DB: ${DB_NAME:-medqueue_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: medqueue_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
